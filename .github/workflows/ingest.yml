name: Sync football data

# Pulls fixtures/results/scorers and recomputes scoring.
on:
  schedule:
    # Every 15 minutes, offset from the busiest minute buckets. GitHub may delay
    # or drop scheduled runs under load; admins can also trigger a manual sync.
    - cron: "7,22,37,52 * * * *"
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger ingest
        run: |
          curl -fsS -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/cron/ingest"
