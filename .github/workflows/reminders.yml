name: Send prediction reminders

on:
  schedule:
    # Offset from minute 0, when GitHub Actions scheduled workflows are busiest.
    - cron: "8 * * * *"
  workflow_dispatch:

jobs:
  reminders:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger reminders
        run: |
          curl -fsS -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/cron/reminders"
